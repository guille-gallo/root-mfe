<single-spa-router>
  <main>
    <nav>
      <div><a href="/hacker-news" onclick="event.preventDefault(); singleSpaNavigate('/hacker-news');">hacker news</a></div>
      <div><a href="/books-store" onclick="event.preventDefault(); singleSpaNavigate('/books-store');">books store</a></div>
    </nav>
    <route default>
      <application name="@guille/mfe"></application>
    </route>
    <route path="hacker-news">
      <application name="@guille/mfe"></application>
    </route>
    <route path="books-store">
      <application name="@guille/bookstore-mfe"></application>
    </route>
  </main>
</single-spa-router>
